<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RISC-V Emulator</title>
  <style>
    :root { --bg: #0d1117; --surface: #161b22; --border: #30363d; --text: #c9d1d9; --dim: #8b949e; --accent: #58a6ff; --green: #3fb950; --red: #f85149; --yellow: #d29922; --purple: #d2a8ff; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

    .navbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .brand { font-weight: 700; font-size: 18px; color: var(--accent); margin-right: 8px; }
    .brand small { font-weight: 400; font-size: 12px; color: var(--dim); margin-left: 6px; }
    .navbar .btn { padding: 4px 14px; font-size: 13px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; transition: all .15s; }
    .navbar .btn:hover:not(:disabled) { background: var(--border); }
    .navbar .btn:disabled { opacity: .4; cursor: not-allowed; }
    .navbar .btn-primary { background: var(--green); color: #000; border-color: var(--green); font-weight: 600; }
    .navbar .btn-primary:hover:not(:disabled) { filter: brightness(1.1); }
    .navbar .btn-warning { background: var(--yellow); color: #000; border-color: var(--yellow); font-weight: 600; }
    .navbar select { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; font-size: 13px; }

    .main { flex: 1; display: grid; grid-template-columns: 1fr 320px; grid-template-rows: 1fr 200px; gap: 0; overflow: hidden; }

    .panel { border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; }
    .panel-header { background: var(--surface); padding: 6px 12px; font-size: 12px; font-weight: 600; color: var(--dim); text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .panel-body { flex: 1; overflow: auto; padding: 8px; }

    /* Code editor panel */
    .editor-area { grid-column: 1; grid-row: 1; }
    #code-editor { width: 100%; height: 100%; background: var(--bg); color: var(--text); border: none; padding: 12px; font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace; font-size: 14px; line-height: 1.6; resize: none; outline: none; tab-size: 4; }
    #code-editor::selection { background: var(--accent); color: #000; }

    /* Right sidebar */
    .sidebar { grid-column: 2; grid-row: 1 / 3; display: flex; flex-direction: column; }
    .reg-section { flex: 0 0 auto; max-height: 50%; }
    .reg-pc { font-size: 14px; font-weight: 700; color: var(--accent); padding: 4px 0; margin-bottom: 4px; font-family: monospace; }
    .reg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; font-size: 11px; font-family: monospace; }
    .reg-item { display: flex; gap: 4px; padding: 2px 4px; border-radius: 3px; }
    .reg-item:hover { background: var(--surface); }
    .reg-item.changed { background: rgba(63, 185, 80, .15); }
    .reg-idx { color: var(--dim); min-width: 24px; }
    .reg-name { color: var(--purple); min-width: 56px; }
    .reg-val { color: var(--accent); min-width: 72px; }
    .reg-dec { color: var(--dim); }
    .reg-footer { font-size: 12px; color: var(--dim); padding: 4px 0; margin-top: 4px; border-top: 1px solid var(--border); }

    .pipeline-section { flex: 0 0 auto; }
    #pipeline { display: flex; align-items: center; gap: 4px; padding: 8px; font-size: 11px; font-family: monospace; }
    .pipe-stage { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; flex: 1; min-width: 0; }
    .pipe-stage.active { border-color: var(--green); }
    .pipe-label { color: var(--accent); font-weight: 600; margin-bottom: 2px; }
    .pipe-detail { color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pipe-arrow { color: var(--dim); }

    .mem-section { flex: 1; min-height: 0; }
    #memory-view { font-family: monospace; font-size: 11px; line-height: 1.4; white-space: pre; color: var(--dim); }

    /* Bottom panels */
    .bottom-left { grid-column: 1; grid-row: 2; display: grid; grid-template-columns: 1fr 1fr; }
    .terminal-panel { border-right: 1px solid var(--border); }
    #terminal-output { font-family: monospace; font-size: 13px; line-height: 1.5; white-space: pre-wrap; color: var(--green); }
    #disassembly { width: 100%; height: 100%; background: var(--bg); color: var(--dim); border: none; padding: 8px; font-family: monospace; font-size: 11px; line-height: 1.4; resize: none; outline: none; }

    #log { font-size: 12px; line-height: 1.5; font-family: monospace; }
    .log-info { color: var(--dim); }
    .log-error { color: var(--red); }
    .log-warn { color: var(--yellow); }

    @media (max-width: 900px) {
      .main { grid-template-columns: 1fr; grid-template-rows: auto; }
      .sidebar { grid-column: 1; grid-row: auto; max-height: 300px; }
      .bottom-left { grid-column: 1; grid-row: auto; }
    }
  </style>
</head>
<body>
  <div class="navbar">
    <span class="brand">RISC-V Emulator<small>RV32I</small></span>
    <select id="btn-example" title="Load example">
      <option value="hello">Hello World</option>
      <option value="fibonacci">Fibonacci</option>
      <option value="factorial">Factorial (Recursive)</option>
      <option value="sum">Sum 1-100</option>
      <option value="prime">Prime Check</option>
      <option value="bubblesort">Bubble Sort</option>
      <option value="gcd">GCD (Euclidean)</option>
      <option value="power">Power (2^10)</option>
      <option value="strcpy">String Copy</option>
      <option value="strlen">String Length</option>
      <option value="fizzbuzz">FizzBuzz</option>
      <option value="binary_search">Binary Search</option>
      <option value="countdown">Countdown</option>
      <option value="sum_array">Sum Array</option>
      <option value="max_array">Find Maximum</option>
    </select>
    <button class="btn btn-primary" id="btn-assemble">Assemble</button>
    <button class="btn btn-primary" id="btn-run">Run</button>
    <button class="btn btn-warning" id="btn-step">Step</button>
    <button class="btn" id="btn-stop">Stop</button>
    <button class="btn" id="btn-reset">Reset</button>
  </div>

  <div class="main">
    <!-- Code editor -->
    <div class="panel editor-area">
      <div class="panel-header">RISC-V Assembly Code</div>
      <textarea id="code-editor" spellcheck="false" placeholder="Write RISC-V assembly here..."></textarea>
    </div>

    <!-- Right sidebar -->
    <div class="sidebar">
      <div class="panel reg-section">
        <div class="panel-header">Registers</div>
        <div class="panel-body">
          <div id="registers"></div>
        </div>
      </div>
      <div class="panel pipeline-section">
        <div class="panel-header">Pipeline</div>
        <div id="pipeline"></div>
      </div>
      <div class="panel mem-section">
        <div class="panel-header">Memory (Hex Dump)</div>
        <div class="panel-body">
          <div id="memory-view"></div>
        </div>
      </div>
    </div>

    <!-- Bottom panels -->
    <div class="bottom-left">
      <div class="panel terminal-panel">
        <div class="panel-header">UART Output</div>
        <div class="panel-body">
          <div id="terminal-output"></div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header">Disassembly / Log</div>
        <div class="panel-body" style="display:flex;flex-direction:column;gap:4px;">
          <textarea id="disassembly" readonly placeholder="Disassembled instructions appear here..."></textarea>
          <div id="log"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
